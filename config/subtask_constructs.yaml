# Subtask → Construct Demand Mapping
#
# Maps subtask numbers to expected construct demands based on cognitive task analysis.
# Weights are 0.0–1.0 indicating expected relevance/load during that subtask.
# Construct keys should match ontology construct labels (case-insensitive).
#
# Populate weights from CTA findings. Current values are placeholders.

subtasks:
  1:
    label: "Subtask 1"
    description: ""
    constructs:
      communication: 0.5
      coordination: 0.3
      shared_mental_model: 0.7

  2:
    label: "Subtask 2"
    description: ""
    constructs:
      coordination: 0.8
      workload: 0.9
      communication: 0.6

  3:
    label: "Subtask 3"
    description: ""
    constructs:
      workload: 0.7
      team_affect: 0.4
      coordination: 0.5

  4:
    label: "Subtask 4"
    description: ""
    constructs:
      coordination: 0.6
      resilience: 0.5
      communication: 0.7

  5:
    label: "Subtask 5"
    description: ""
    constructs:
      team_affect: 0.6
      shared_mental_model: 0.5
      communication: 0.4

